name: Regenerate CV PDF

on:
  push:
    branches: [main]
    paths: &cv_paths
      - "cv.markdown"
      - "about.markdown"
      - "activities.markdown"
      - "_publications/**"
      - "_talks/**"
      - "_students/**"
      - "_software/**"
      - "_includes/cv/**"
      - "assets/css/cv-print.scss"
      - "_data/scholar_stats.yml"
      - "generate_cv_pdf.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".python-version"
      - ".github/workflows/cv.yml"
  pull_request:
    paths: *cv_paths
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cv-pdf-${{ github.ref }}
  cancel-in-progress: false

jobs:
  regenerate-cv-pdf:
    if: "!contains(github.event.head_commit.message || '', '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history so generate_cv_pdf.py can derive
          # SOURCE_DATE_EPOCH from the last commit touching CV inputs.
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: .ruby-version
          bundler-cache: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version-file: .python-version

      - name: Install WeasyPrint system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b \
            libcairo2 libgdk-pixbuf-2.0-0 libffi-dev shared-mime-info

      - name: Install Python deps
        run: uv sync --group cv

      - name: Generate CV PDF
        env:
          LANG: C.UTF-8
          LC_ALL: C.UTF-8
        run: uv run python generate_cv_pdf.py

      - name: Upload PDF and thumbnail as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cv-anne-schuth
          path: |
            assets/cv-anne-schuth.pdf
            assets/cv-thumbnail.png
          if-no-files-found: error
          retention-days: 14

      - name: Commit regenerated PDF and thumbnail
        # Only commit on direct pushes to main; for PRs the artifact above
        # is the deliverable, since GITHUB_TOKEN can't push to forks.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain assets/cv-anne-schuth.pdf assets/cv-thumbnail.png)" ]]; then
            git add assets/cv-anne-schuth.pdf assets/cv-thumbnail.png
            git commit -m "chore: regenerate CV PDF and thumbnail [skip ci]"
            git push
          else
            echo "No changes to CV PDF or thumbnail"
          fi
