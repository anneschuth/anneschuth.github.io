# Pre-commit hooks for the anneschuth.nl Jekyll site.
# Run locally on every commit and enforced on CI (.github/workflows/ci.yml).
# Run all hooks manually with: uv run pre-commit run --all-files
repos:
  - repo: local
    hooks:
      - id: jekyll-build
        name: Jekyll build test
        entry: bundle exec jekyll build --trace
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: check-links
        name: Check internal links
        entry: uv run python check_links.py
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: check-yaml
        name: Check YAML frontmatter
        entry: uv run python check_yaml.py
        language: system
        files: \.md$
        pass_filenames: false
        stages: [pre-commit]

      - id: update-citations
        name: Update citation counts from Google Scholar
        entry: uv run python fetch_scholar_data.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [manual]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        name: Lint Python (ruff)
        args: [--no-fix]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
        exclude: \.md$
      - id: check-added-large-files
        args: ['--maxkb=30000']
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: detect-private-key

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        args: [--fix]
